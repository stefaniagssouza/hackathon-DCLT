name: CI/CD DevSecOps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write

jobs:
  validate:
    name: Testes e scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: donation-service/go.sum

      - name: Test donation-service
        working-directory: donation-service
        run: go test ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python services
        run: |
          python -m py_compile ngo-service/app.py
          python -m py_compile volunteer-service/app.py

      - name: Trivy filesystem and IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif


  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: donation-service
            context: donation-service
          - service: ngo-service
            context: ngo-service
          - service: volunteer-service
            context: volunteer-service
    steps:
      - uses: actions/checkout@v4

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}


      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3


      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}

          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}


      - name: Show generated image tags
        run: |
          echo "Images geradas:"
          echo "${{ steps.meta.outputs.tags }}"


      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ matrix.service }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'imageDetails[*].[imageTags,imageDigest]' \
            --output json

      - name: Save first generated tag
        run: |
          mkdir -p out
          echo "${{ steps.meta.outputs.tags }}" | head -n1 > out/${{ matrix.service }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-tags-${{ matrix.service }}
          path: out/${{ matrix.service }}.txt

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/download-artifact@v4
        with:
          pattern: image-tags-*
          path: tags
          merge-multiple: true

      - name: Update manifests
        run: |
          sed -i "s|image: .*|image: $(cat tags/donation-service.txt)|" GitOps/donation/deployment.yaml
          sed -i "s|image: .*|image: $(cat tags/ngo-service.txt)|" GitOps/ngo/deployment.yaml
          sed -i "s|image: .*|image: $(cat tags/volunteer-service.txt)|" GitOps/volunteer/deployment.yaml

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GitOps
          git diff --cached --quiet && exit 0
          git commit -m "Update GitOps manifests"
          git push origin HEAD:main


