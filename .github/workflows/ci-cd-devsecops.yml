name: CI/CD DevSecOps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write

jobs:
  validate:
    name: Testes e scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: donation-service/go.sum

      - name: Test donation-service
        working-directory: donation-service
        run: go test ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python services
        run: |
          python -m py_compile ngo-service/app.py
          python -m py_compile volunteer-service/app.py

      - name: Trivy filesystem and IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: donation-service
          - service: ngo-service
          - service: volunteer-service
    steps:
      # Não precisamos buildar nada localmente já que não podemos enviar.
      # Apenas geramos o arquivo de tag apontando para o 'latest' que já existe no seu ECR.
      - name: Save existing ECR tag
        run: |
          mkdir -p out
          echo "${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest" > out/${{ matrix.service }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-tags-${{ matrix.service }}
          path: out/${{ matrix.service }}.txt

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/download-artifact@v4
        with:
          pattern: image-tags-*
          path: tags
          merge-multiple: true

      - name: Update manifests to latest
        run: |
          sed -i "s|image: .*|image: $(cat tags/donation-service.txt)|" GitOps/donation/deployment.yaml
          sed -i "s|image: .*|image: $(cat tags/ngo-service.txt)|" GitOps/ngo/deployment.yaml
          sed -i "s|image: .*|image: $(cat tags/volunteer-service.txt)|" GitOps/volunteer/deployment.yaml

      - name: Commit and Push to GitOps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GitOps
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos manifestos."
            exit 0
          fi
          git commit -m "Fix GitOps images to latest available in ECR"
          git push origin HEAD:main


