name: CI/CD DevSecOps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write

jobs:
  validate:
    name: Testes e scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: donation-service/go.sum

      - name: Test donation-service
        working-directory: donation-service
        run: go test ./...

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python services
        run: |
          python -m py_compile ngo-service/app.py
          python -m py_compile volunteer-service/app.py

      - name: Trivy filesystem and IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif


  build-and-push:
    name: Build e push das imagens
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        include:
          - service: ngo-service
            context: ngo-service
            deployment: GitOps/ngo/deployment.yaml

          - service: donation-service
            context: donation-service
            deployment: GitOps/donation/deployment.yaml

          - service: volunteer-service
            context: volunteer-service
            deployment: GitOps/volunteer/deployment.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}


      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2


      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3


      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}

          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}


      - name: Show generated image tags
        run: |
          echo "Images geradas:"
          echo "${{ steps.meta.outputs.tags }}"


      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ matrix.service }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'imageDetails[*].[imageTags,imageDigest]' \
            --output json

      - name: Update deployment manifest
        run: |
          sed -i "s|image:.*|image: ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}|g" \
            ${{ matrix.deployment }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit deployment changes
        run: |
          git add ${{ matrix.deployment }}

          git commit -m "Deploy ${{ matrix.service }} ${{ github.sha }}" || echo "No changes"

      - name: Push changes
        run: |
          git push


