apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-service
  namespace: donation
  labels:
    app: donation-service
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/part-of: solidarytech
    cost-center: NGO-Core
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: donation-service
  template:
    metadata:
      labels:
        app: donation-service
        app.kubernetes.io/name: donation-service
        app.kubernetes.io/part-of: solidarytech
        cost-center: NGO-Core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8082"
    spec:
      serviceAccountName: donation-service
      containers:
        - name: donation-service
          image: 914963610886.dkr.ecr.us-east-1.amazonaws.com/donation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - secretRef:
                name: donation-secrets
          env:
            - name: PORT
              value: "8082"
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
            - name: OTEL_SERVICE_NAME
              value: donation-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-gateway-opentelemetry-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=solidarytech,deployment.environment=production,k8s.namespace.name=donation
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
