apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ngo-service
  namespace: ngo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ngo-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
