apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.157.0
    helm:
      values: |
        mode: deployment
        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib
        replicaCount: 2

        extraEnvs:
          - name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: newrelic-secret
                key: NEW_RELIC_LICENSE_KEY

        ports:
          otlp:
            enabled: true
          otlp-http:
            enabled: true
          metrics:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP

        serviceMonitor:
          enabled: true
          metricsEndpoints:
            - port: metrics

        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            memory_limiter:
              check_interval: 1s
              limit_percentage: 75
              spike_limit_percentage: 20
            resource:
              attributes:
                - key: service.namespace
                  value: solidarytech
                  action: upsert
            batch:
              timeout: 5s
              send_batch_size: 1024

          exporters:
            prometheus:
              endpoint: 0.0.0.0:8889
              resource_to_telemetry_conversion:
                enabled: true
            otlphttp/newrelic:
              endpoint: https://otlp.nr-data.net:4318
              headers:
                api-key: ${env:NEW_RELIC_LICENSE_KEY}
              compression: gzip
            otlphttp/loki:
              endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
            debug:
              verbosity: basic

          service:
            telemetry:
              logs:
                level: info
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [otlphttp/newrelic, debug]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [prometheus, otlphttp/newrelic]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, resource, batch]
                exporters: [otlphttp/loki, otlphttp/newrelic]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
