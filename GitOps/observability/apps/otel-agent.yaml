apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.157.0
    helm:
      values: |
        mode: daemonset
        fullnameOverride: otel-agent
        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib

        presets:
          logsCollection:
            enabled: true
            includeCollectorLogs: false
          kubernetesAttributes:
            enabled: true

        config:
          exporters:
            otlp/gateway:
              endpoint: otel-gateway-opentelemetry-collector.observability.svc.cluster.local:4317
              tls:
                insecure: true
            debug:
              verbosity: basic
          service:
            pipelines:
              logs:
                receivers: [filelog]
                processors: [memory_limiter, k8sattributes, batch]
                exporters: [otlp/gateway, debug]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
