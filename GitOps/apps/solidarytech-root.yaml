apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solidarytech-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stefaniagssouza/hackathon-DCLT.git
    targetRevision: main
    path: GitOps/apps
    directory:
      recurse: true
      exclude: solidarytech-root.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
